services:
  - type: web
    name: oceanscan-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://oceanscan-ai.vercel.app
      - key: FRONTEND_URL
        value: https://oceanscan-ai.vercel.app
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: OceanGuard AI
      - key: LOG_LEVEL
        value: INFO
      - key: YOLO_CONFIDENCE_THRESHOLD
        value: "0.25"
      - key: YOLO_IOU_THRESHOLD
        value: "0.45"
      - key: MAX_UPLOAD_SIZE
        value: "104857600"
      - key: MAX_VIDEO_DURATION
        value: "300"
      - key: NOAA_CDO_TOKEN
        sync: false
      - key: WAQI_TOKEN
        sync: false
    disk:
      name: oceanscan-data
      mountPath: /app/data
      sizeGB: 10
